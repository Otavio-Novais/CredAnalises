[tool:pytest]
testpaths = tests
pythonpath = src .



# Configurar mutmut e Radon (se necessário)
[radon]
exclude = tests/*.py
cc_min = B

[mutmut]
paths_to_mutate = src/credit_engine/
also_copy =
	mutmut_runner.py
	src/credit_engine/__init__.py
	src/credit_engine/constants.py
	src/credit_engine/database.py
	src/credit_engine/main.py
	src/credit_engine/repository.py
	src/credit_engine/schemas.py
	src/credit_engine/service.py
	src/credit_engine/user_service.py
runner = python mutmut_runner.py
tests_dir = tests/
mutate_only_covered_lines = False
# Força o mutmut a rodar os mutantes de forma direta, ignorando o bug do 'src.'
use_coverage = False