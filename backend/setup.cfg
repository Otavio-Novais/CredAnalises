[tool:pytest]
testpaths = tests
pythonpath = src



# Configurar mutmut e Radon (se necessário)
[radon]
exclude = tests/*.py
cc_min = B

[mutmut]
paths_to_mutate = src/credit_engine/
runner = python -m pytest
tests_dir = tests/
mutate_only_covered_lines = False
# Força o mutmut a rodar os mutantes de forma direta, ignorando o bug do 'src.'
use_coverage = False