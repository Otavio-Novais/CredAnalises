name: Frontend Quality & Testing CI

on:
  push:
    branches: [ main, master ]
    paths:
      - 'frontend/**'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'frontend/**'

jobs:
  validate-frontend:
    runs-on: ubuntu-latest

    steps:
    - name: Copiar código do repositório
      uses: actions/checkout@v4

    - name: Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: 'frontend/package-lock.json'

    - name: Instalar Dependências
      run: |
        cd frontend
        npm ci

    - name: 1. Executar Testes de Componente (Vitest)
      run: |
        cd frontend
        npm run test

    - name: 2. Executar Testes de Mutação (StrykerJS)
      run: |
        cd frontend
        npm run test:mutation