name: Frontend Quality & Testing CI

on:
  push:
    branches: [ main, master ]
    paths:
      - 'frontend/**'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'frontend/**'

jobs:
  validate-frontend:
    runs-on: ubuntu-latest

    steps:
    - name: Copiar código do repositório
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Instalar Dependências
      run: |
        python -m pip install --upgrade pip
        pip install -r frontend/src/requirements.txt
        pip install flake8 pylint

    - name: 1. Verificar Sintaxe Python (Pylint)
      run: |
        cd frontend/src
        pylint app.py --disable=all --enable=syntax-error,undefined-variable

    - name: 2. Verificar Estilo (Flake8)
      run: |
        cd frontend/src
        flake8 app.py --count --select=E9,F63,F7,F82 --show-source --statistics

    - name: 3. Testar Inicialização da App (Streamlit)
      run: |
        cd frontend/src
        # Testa se o app inicia sem erros (modo não-interativo)
        timeout 10 streamlit run app.py --logger.level=debug 2>&1 | head -50 || true